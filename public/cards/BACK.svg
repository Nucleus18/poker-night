    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="0.55" stop-color="#fee2e2" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#991b1b" stop-opacity="0.9"/>
